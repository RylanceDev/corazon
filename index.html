<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Corazón con Música</title>
    <style>
        body { background-color: black; margin: 0; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Estilo del botón */
        #musicBtn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
            z-index: 10;
        }
        #musicBtn:hover { background: #cc0000; }
    </style>
</head>
<body>

    <button id="musicBtn">Reproducir Música 🎵</button>
    
    <!-- El archivo debe llamarse exactamente MrsMagic.mp3 en tu repo -->
    <audio id="bgMusic" src="MrsMagic.mp3" loop></audio>

    <canvas id="heartCanvas"></canvas>

    <script>
        // --- Lógica de la Música ---
        const btn = document.getElementById('musicBtn');
        const music = document.getElementById('bgMusic');

        btn.addEventListener('click', () => {
            if (music.paused) {
                music.play();
                btn.textContent = "Pausar Música ⏸️";
            } else {
                music.pause();
                btn.textContent = "Reproducir Música 🎵";
            }
        });

        // --- Lógica del Corazón (Animación) ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        ctx.strokeStyle = "red";
        ctx.lineWidth = 2;
        ctx.translate(canvas.width / 2, canvas.height / 2);

        function getHeartPoint(n) {
            const x = 15 * Math.pow(Math.sin(n), 3);
            const y = 12 * Math.cos(n) - 5 * Math.cos(2 * n) - 2 * Math.cos(3 * n) - Math.cos(4 * n);
            return { x: x, y: -y };
        }

        let i = 0, j = 0;
        function animar() {
            if (i < 18) {
                if (j === 0) {
                    ctx.beginPath();
                    const p = getHeartPoint(0);
                    ctx.moveTo(p.x * i, p.y * i);
                }
                const p = getHeartPoint(j / 15);
                ctx.lineTo(p.x * i, p.y * i);
                ctx.stroke();
                j++;
                if (j > 100) { j = 0; i++; }
                requestAnimationFrame(animar);
            }
        }
        animar();
    </script>
</body>
</html>
