<!DOCTYPE html>
<html>
<head>
    <title>Corazón ❤️</title>
    <style>
        body{
            background:black;
            margin:0;
            overflow:hidden;
        }
        canvas{
            display:block;
        }
    </style>
</head>
<body>

<audio autoplay loop>
    <source src="MrsMagic.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.strokeStyle = "red";
ctx.lineWidth = 2;

function heart(t){
    let x = 15*Math.pow(Math.sin(t),3);
    let y = 12*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    return {
        x:x*15+canvas.width/2,
        y:-y*15+canvas.height/2
    };
}

let scale = 1;

function draw(){
    ctx.beginPath();

    for(let i=0;i<100;i++){
        let p = heart(i/15);

        if(i==0)
            ctx.moveTo(p.x*scale,p.y*scale);
        else
            ctx.lineTo(p.x*scale,p.y*scale);
    }

    ctx.stroke();

    scale += 0.05;

    if(scale < 18)
        requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
